services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lasagna
      POSTGRES_PASSWORD: lasagna
      POSTGRES_DB: lasagna
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lasagna"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      NO_COLOR: "1"
    volumes:
      - ./packages/core/src:/app/packages/core/src
      - ./packages/api/src:/app/packages/api/src
      - ./.env:/app/.env
    tty: true

volumes:
  pgdata:
