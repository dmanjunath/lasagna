services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lasagna
      POSTGRES_PASSWORD: lasagna
      POSTGRES_DB: lasagna
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lasagna"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      NO_COLOR: "1"
    volumes:
      - ./packages/core/src:/app/packages/core/src
      - ./packages/api/src:/app/packages/api/src
      - ./.env:/app/.env
    tty: true

  web:
    build:
      context: .
      dockerfile: Dockerfile.web.dev
    ports:
      - "5173:5173"
    depends_on:
      - api
    environment:
      VITE_API_PROXY_TARGET: http://api:3000
    volumes:
      - ./packages/core/src:/app/packages/core/src
      - ./packages/web/src:/app/packages/web/src
      - ./packages/web/public:/app/packages/web/public
      - ./packages/web/index.html:/app/packages/web/index.html
      - ./packages/web/vite.config.ts:/app/packages/web/vite.config.ts
      - ./packages/web/tailwind.config.js:/app/packages/web/tailwind.config.js
      - ./packages/web/postcss.config.js:/app/packages/web/postcss.config.js
      - ./packages/web/tsconfig.json:/app/packages/web/tsconfig.json
    tty: true

volumes:
  pgdata:
