<svg width="32" height="32" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="axisGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#78716c"/>
      <stop offset="100%" stop-color="#57534e"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b45309"/>
      <stop offset="50%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#fbbf24" flood-opacity="0.5"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <path
    d="M16 12 L16 64 L68 64"
    fill="none"
    stroke="url(#axisGrad)"
    stroke-width="3.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <line
    x1="28" y1="52" x2="52" y2="16"
    stroke="url(#amberGrad)"
    stroke-width="3.5"
    stroke-linecap="round"
    filter="url(#glow)"
  />

  <circle cx="52" cy="16" r="2.5" fill="#fef3c7"/>
</svg>
