<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>LasagnaFi - Offline</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #FBF6EC;
            color: #1F1A16;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            padding-top: max(20px, env(safe-area-inset-top));
            padding-bottom: max(20px, env(safe-area-inset-bottom));
        }
        
        .container {
            text-align: center;
            max-width: 320px;
            width: 100%;
        }
        
        .icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, #C9543A 0%, #E6B85C 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        
        h1 {
            font-size: 24px;
            margin-bottom: 12px;
            color: #1F1A16;
        }
        
        p {
            font-size: 15px;
            color: #3A322C;
            line-height: 1.5;
            margin-bottom: 24px;
        }
        
        .button {
            background: #C9543A;
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
            min-height: 48px;
        }
        
        .button:active {
            transform: scale(0.98);
            opacity: 0.9;
        }
        
        .status {
            margin-top: 20px;
            padding: 12px;
            background: rgba(201, 84, 58, 0.1);
            border-radius: 8px;
            font-size: 14px;
            color: #C9543A;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📱</div>
        <h1>You're Offline</h1>
        <p>LasagnaFi needs an internet connection to work. Please check your connection and try again.</p>
        <button class="button" onclick="window.location.reload()">Retry</button>
        <div class="status">
            Some features may be available offline once loaded.
        </div>
    </div>
</body>
</html>
