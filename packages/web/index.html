<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0, user-scalable=yes" />
    
    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="LasagnaFi" />
    <meta name="theme-color" content="#C9543A" />
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Self-hosted personal finance platform" />
    <meta name="keywords" content="finance, personal finance, budgeting, investment" />
    
    <!-- Open Graph -->
    <meta property="og:title" content="LasagnaFi - Personal Finance Platform" />
    <meta property="og:description" content="Self-hosted personal finance platform" />
    <meta property="og:type" content="website" />
    
    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Apple Touch Icons for different sizes -->
    <link rel="apple-touch-icon" sizes="152x152" href="/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icon-167x167.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-180x180.png" />
    
    <!-- Startup Images for iOS -->
    <link rel="apple-touch-startup-image" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)" href="/startup-iphone-x.png">
    <link rel="apple-touch-startup-image" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3)" href="/startup-iphone-xr.png">
    <link rel="apple-touch-startup-image" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2)" href="/startup-iphone-xs-max.png">
    
    <title>LasagnaFi</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"></noscript>
    
    <!-- Mobile Optimization -->
    <style>
      * {
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
      }
      
      html {
        height: 100%;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      body {
        overscroll-behavior-y: none;
        overscroll-behavior-x: none;
        touch-action: pan-y;
      }
      
      /* Prevent bounce scroll on iOS */
      @supports (-webkit-overflow-scrolling: touch) {
        body {
          -webkit-overflow-scrolling: touch;
        }
      }
      
      /* Safe area support */
      @supports (padding: max(0px)) {
        .safe-top { padding-top: max(16px, env(safe-area-inset-top)); }
        .safe-bottom { padding-bottom: max(16px, env(safe-area-inset-bottom)); }
        .safe-left { padding-left: max(16px, env(safe-area-inset-left)); }
        .safe-right { padding-right: max(16px, env(safe-area-inset-right)); }
      }
      
      /* PWA Splash Screen */
      #pwa-splash {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: #FBF6EC;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.3s ease;
      }
      
      #pwa-splash.hidden {
        opacity: 0;
        pointer-events: none;
      }
      
      #pwa-splash .logo {
        width: 80px;
        height: 80px;
        background: linear-gradient(135deg, #C9543A 0%, #E6B85C 100%);
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Instrument Serif', Georgia, serif;
        font-size: 32px;
        color: #FBF6EC;
        animation: pulse 2s ease-in-out infinite;
      }
      
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
    </style>
  </head>
  <body>
    <!-- PWA Splash Screen -->
    <div id="pwa-splash">
      <div class="logo">L</div>
    </div>
    
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
