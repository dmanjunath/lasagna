<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Modern L with gradient layers -->
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B"/>
      <stop offset="50%" style="stop-color:#FFA07A"/>
      <stop offset="100%" style="stop-color:#FFD93D"/>
    </linearGradient>
  </defs>

  <!-- Stylized L made of stacked layers -->
  <g transform="translate(40, 30)">
    <!-- Vertical part of L - stacked -->
    <rect x="0" y="0" width="35" height="18" rx="4" fill="#E74C3C" opacity="0.9"/>
    <rect x="0" y="22" width="35" height="18" rx="4" fill="#F39C12" opacity="0.9"/>
    <rect x="0" y="44" width="35" height="18" rx="4" fill="#E74C3C" opacity="0.9"/>
    <rect x="0" y="66" width="35" height="18" rx="4" fill="#F39C12" opacity="0.9"/>
    <rect x="0" y="88" width="35" height="18" rx="4" fill="#E74C3C" opacity="0.9"/>
    <rect x="0" y="110" width="35" height="18" rx="4" fill="#F39C12" opacity="0.9"/>

    <!-- Horizontal part of L -->
    <rect x="39" y="110" width="30" height="18" rx="4" fill="#E74C3C" opacity="0.9"/>
    <rect x="73" y="110" width="30" height="18" rx="4" fill="#F39C12" opacity="0.9"/>
  </g>

  <!-- Text -->
  <text x="100" y="175" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#2C3E50" text-anchor="middle">LASAGNA</text>
</svg>
