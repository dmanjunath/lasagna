<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Minimal abstract layers - clean tech aesthetic -->
  <defs>
    <linearGradient id="warm" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6B6B"/>
      <stop offset="100%" style="stop-color:#FF8E53"/>
    </linearGradient>
  </defs>

  <!-- Three elegant lines representing layers -->
  <rect x="40" y="60" width="120" height="8" rx="4" fill="url(#warm)"/>
  <rect x="50" y="85" width="100" height="8" rx="4" fill="url(#warm)" opacity="0.7"/>
  <rect x="60" y="110" width="80" height="8" rx="4" fill="url(#warm)" opacity="0.4"/>

  <!-- Text -->
  <text x="100" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="300" fill="#2C3E50" text-anchor="middle" letter-spacing="8">LASAGNA</text>
</svg>
