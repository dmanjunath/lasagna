<svg width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
  <title>Lasagna</title>
  <defs>
    <linearGradient id="amberDark" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="glowDark">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background for preview -->
  <rect width="80" height="80" fill="#0c0a09"/>

  <path
    d="M16 12 L16 64 L68 64"
    fill="none"
    stroke="#d6d3d1"
    stroke-width="3.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <line
    x1="28" y1="52" x2="52" y2="16"
    stroke="url(#amberDark)"
    stroke-width="3.5"
    stroke-linecap="round"
    filter="url(#glowDark)"
  />
</svg>
