<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Playful wavy layers with personality -->
  <defs>
    <linearGradient id="yellow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE66D"/>
      <stop offset="100%" style="stop-color:#F4D03F"/>
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B"/>
      <stop offset="100%" style="stop-color:#EE5A5A"/>
    </linearGradient>
    <linearGradient id="cream" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF5E6"/>
      <stop offset="100%" style="stop-color:#FFE4C4"/>
    </linearGradient>
  </defs>

  <!-- Wavy pasta layer 1 -->
  <path d="M30 130 Q50 120 70 130 Q90 140 110 130 Q130 120 150 130 Q170 140 170 130 L170 145 Q150 155 130 145 Q110 135 90 145 Q70 155 50 145 Q30 135 30 145 Z" fill="url(#yellow)"/>

  <!-- Sauce layer -->
  <path d="M35 105 Q55 95 75 105 Q95 115 115 105 Q135 95 155 105 Q165 110 165 105 L165 118 Q145 128 125 118 Q105 108 85 118 Q65 128 45 118 Q35 113 35 118 Z" fill="url(#red)"/>

  <!-- Cheese layer -->
  <path d="M40 82 Q60 72 80 82 Q100 92 120 82 Q140 72 160 82 L160 93 Q140 103 120 93 Q100 83 80 93 Q60 103 40 93 Z" fill="url(#cream)"/>

  <!-- Pasta layer 2 -->
  <path d="M45 60 Q65 50 85 60 Q105 70 125 60 Q145 50 155 60 L155 72 Q145 82 125 72 Q105 62 85 72 Q65 82 45 72 Z" fill="url(#yellow)"/>

  <!-- Top cheese drip -->
  <path d="M50 45 Q55 38 60 45 Q70 35 80 45 Q90 38 100 45 Q110 35 120 45 Q130 38 140 45 Q145 50 150 45 L150 52 Q140 58 130 52 Q120 46 110 52 Q100 58 90 52 Q80 46 70 52 Q60 58 50 52 Z" fill="url(#cream)"/>

  <!-- Eyes for fun -->
  <circle cx="85" cy="95" r="8" fill="white"/>
  <circle cx="115" cy="95" r="8" fill="white"/>
  <circle cx="87" cy="96" r="4" fill="#2C3E50"/>
  <circle cx="117" cy="96" r="4" fill="#2C3E50"/>

  <!-- Smile -->
  <path d="M85 115 Q100 125 115 115" fill="none" stroke="#2C3E50" stroke-width="3" stroke-linecap="round"/>

  <!-- Text -->
  <text x="100" y="175" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="800" fill="#FF6B6B" text-anchor="middle">lasagna</text>
</svg>
