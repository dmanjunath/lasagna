    function useNavigate() {
      const { navigate } = useContext(RouterContext);
      return navigate;
    }

    function useLocation() {
      const { path } = useContext(RouterContext);
      return { pathname: path };
    }

    function useParams() {
      const { path } = useContext(RouterContext);
      // Extract params from path like /plans/savings-:id
      const match = path.match(/\/plans\/savings-(.+)/);
      if (match) return { id: `savings-${match[1]}` };
      return {};
    }

    function SimpleRouter({ children }) {
      const [path, setPath] = useState(() => {
        const hash = window.location.hash.slice(1) || '/';
        return hash;
      });

      useEffect(() => {
        const handleHash = () => {
          const hash = window.location.hash.slice(1) || '/';
          setPath(hash);
        };
        window.addEventListener('hashchange', handleHash);
        return () => window.removeEventListener('hashchange', handleHash);
      }, []);

      const navigate = (newPath) => {
        window.location.hash = newPath;
      };

      return (
        <RouterContext.Provider value={{ path, navigate }}>
          {children}
        </RouterContext.Provider>
      );
    }

    function Routes({ children }) {
      const { path } = useContext(RouterContext);

      for (const child of React.Children.toArray(children)) {
        if (!child.props) continue;
        const routePath = child.props.path;

        // Exact match
        if (routePath === path) return child.props.element;

        // Match /plans/savings-:id pattern
        if (routePath === '/plans/savings-:id' && path.startsWith('/plans/savings-')) {
          return child.props.element;
        }

        // Wildcard
        if (routePath === '*') return child.props.element;
      }

      return null;
    }

              { label: 'Remaining', value: `$${remainingAmount.toLocaleString()}` },
              { label: 'Months to Goal', value: monthsToGoal.toString() },
              { label: 'On Track', value: data.onTrack ? 'Yes' : 'Behind', success: data.onTrack, warning: !data.onTrack },
            ].map((stat, i) => (
              <div key={i} className={`stat-card glass-card rounded-2xl p-4 md:p-5 animate-fadeIn stagger-${i + 1}`}>
                <p className="text-text-secondary text-xs md:text-sm mb-2">{stat.label}</p>
                <div className={`font-display text-xl md:text-2xl font-semibold ${stat.success ? 'text-success' : stat.warning ? 'text-warning' : ''}`}>{stat.value}</div>
              </div>
            ))}
          </div>

          {/* Progress Chart */}
          <Section title="Savings History">
            <div className="glass-card rounded-2xl p-4 md:p-6">
              <div className="h-48 md:h-64">
                <ResponsiveContainer width="100%" height="100%">
                  <AreaChart data={data.history}>
                    <defs>
                      <linearGradient id="savingsGradient" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="5%" stopColor="#4ade80" stopOpacity={0.3}/>
                        <stop offset="95%" stopColor="#4ade80" stopOpacity={0}/>
                      </linearGradient>
                    </defs>
                    <XAxis dataKey="month" stroke="#a8a29e" fontSize={12} tickLine={false} axisLine={false} />
                    <YAxis stroke="#a8a29e" fontSize={12} tickLine={false} axisLine={false} tickFormatter={v => `$${v/1000}k`} />
                    <Tooltip contentStyle={{ background: '#1c1917', border: '1px solid rgba(120,113,108,0.2)', borderRadius: '12px' }}
                      formatter={(value) => [`$${value.toLocaleString()}`, 'Saved']} />
                    <Area type="monotone" dataKey="value" stroke="#4ade80" strokeWidth={2} fill="url(#savingsGradient)" />
                  </AreaChart>
                </ResponsiveContainer>
              </div>
            </div>
          </Section>

          {/* Quick Actions */}
          <Section title="Actions">
            <div className="flex flex-wrap gap-3">
              <button className="px-4 md:px-5 py-3 bg-gradient-to-r from-accent to-accent-dim text-bg rounded-xl text-sm font-semibold btn-lift">Add Contribution</button>
              <button className="px-4 md:px-5 py-3 glass-card rounded-xl text-sm font-medium glass-card-hover">Edit Goal</button>
              <button className="px-4 md:px-5 py-3 glass-card rounded-xl text-sm font-medium glass-card-hover">Set Reminder</button>
            </div>
          </Section>
        </div>
      );
    }

    // Retirement Page with weighted returns
    function RetirementPage() {
      const data = documentsData['retirement'];
      const [chatInput, setChatInput] = useState('');
      const [messages, setMessages] = useState([{ role: 'assistant', content: "I've analyzed your retirement plan. You're on track but there's a $1,500/month gap. Would you like me to model some scenarios?" }]);
      const [showHistory, setShowHistory] = useState(false);
      const [showScenario, setShowScenario] = useState(false);
      const [showEditAssumptions, setShowEditAssumptions] = useState(false);
      const [showDrawdownOrder, setShowDrawdownOrder] = useState(false);
      const [recommendations, setRecommendations] = useState(data.recommendations);
      const [scenarioResult, setScenarioResult] = useState(null);
      const [drawdownOrder, setDrawdownOrder] = useState(data.drawdownOrder);
      const [useRealReturns, setUseRealReturns] = useState(true);
      const inflationRate = 0.025;
      const [assumptions, setAssumptions] = useState({
        retirementAge: 65, lifeExpectancy: 90, incomeRequired: 5500,
        currentSavings: 450000, monthlyContribution: 2500, inflationRate: 2.5,
      });

      // Calculate weighted return from asset allocation
      const weightedNominalReturn = data.assetAllocation.reduce((sum, a) => sum + (a.allocation * a.expectedReturn), 0);
      const weightedRealReturn = weightedNominalReturn - inflationRate;
      const displayReturn = useRealReturns ? weightedRealReturn : weightedNominalReturn;

      const sendMessage = () => {
        if (!chatInput.trim()) return;
        setMessages(prev => [...prev, { role: 'user', content: chatInput }]);
        setChatInput('');
        setTimeout(() => {
          setMessages(prev => [...prev, { role: 'assistant', content: "Based on your portfolio allocation, I've calculated your expected return. Your drawdown order is optimized for tax efficiency." }]);
        }, 1000);
      };

      const runScenario = () => {
        setShowScenario(true);
        setTimeout(() => {
          setScenarioResult({
            retireAt62: { score: 58, balance: 980000, monthlyIncome: 3200 },
            retireAt65: { score: 73, balance: 1200000, monthlyIncome: 4000 },
            retireAt67: { score: 85, balance: 1450000, monthlyIncome: 4800 },
          });
        }, 1500);
      };

      const moveDrawdownItem = (id, direction) => {
        const idx = drawdownOrder.findIndex(d => d.id === id);
        if ((direction === 'up' && idx === 0) || (direction === 'down' && idx === drawdownOrder.length - 1)) return;
        const newOrder = [...drawdownOrder];
        const swapIdx = direction === 'up' ? idx - 1 : idx + 1;
        [newOrder[idx], newOrder[swapIdx]] = [newOrder[swapIdx], newOrder[idx]];
        setDrawdownOrder(newOrder);
      };

      return (
        <div className="flex-1 flex flex-col h-screen">
          {/* Header */}
          <div className="px-4 md:px-8 py-4 md:py-5 border-b border-border flex flex-col md:flex-row md:items-center justify-between gap-3 bg-bg-elevated/50 backdrop-blur-sm">
            <div className="flex items-center gap-4">
              <div className="w-10 h-10 rounded-xl bg-accent/10 flex items-center justify-center text-accent text-lg">◎</div>
              <div>
                <h2 className="font-display text-lg md:text-xl font-medium">{data.name}</h2>
                <div className="text-sm text-text-muted">Last updated 2 hours ago · {data.version}</div>
              </div>
            </div>
            <div className="flex items-center gap-2 md:gap-3 flex-wrap">
              <button onClick={() => setShowHistory(true)} className="px-3 md:px-4 py-2 text-sm rounded-xl glass-card glass-card-hover font-medium">History</button>
              <button onClick={runScenario} className="px-3 md:px-4 py-2 text-sm rounded-xl bg-gradient-to-r from-accent to-accent-dim text-bg font-semibold btn-lift">Run Scenario</button>
            </div>
          </div>

          <div className="flex-1 flex flex-col md:flex-row overflow-hidden">
            {/* Main Content */}
            <div className="flex-1 overflow-y-auto scrollbar-thin p-4 md:p-8">
              {/* Return Toggle */}
              <div className="glass-card rounded-2xl p-4 mb-6 flex flex-col md:flex-row md:items-center justify-between gap-4 animate-fadeIn">
                <div>
                  <div className="text-sm text-text-muted mb-1">Expected Return (weighted by allocation)</div>
                  <div className="font-display text-2xl md:text-3xl font-semibold text-accent tabular-nums">
                    {(displayReturn * 100).toFixed(1)}%
                    <span className="text-base text-text-muted ml-2">{useRealReturns ? 'real' : 'nominal'}</span>
                  </div>
                </div>
                <div className="flex items-center gap-3">
                  <span className={`text-sm ${!useRealReturns ? 'text-text' : 'text-text-muted'}`}>Total Return</span>
                  <button onClick={() => setUseRealReturns(!useRealReturns)}
                    className={`w-12 h-7 rounded-full toggle-track flex items-center px-0.5 ${useRealReturns ? 'bg-accent' : 'bg-border'}`}>
                    <div className={`w-6 h-6 rounded-full bg-white shadow-sm toggle-thumb ${useRealReturns ? 'translate-x-5' : ''}`} />
                  </button>
                  <span className={`text-sm ${useRealReturns ? 'text-text' : 'text-text-muted'}`}>Real Return</span>
                </div>
              </div>

              {/* Asset Allocation Breakdown */}
              <Section title="Asset Allocation & Expected Returns">
                <div className="glass-card rounded-2xl p-4 md:p-5">
                  <div className="space-y-3">
                    {data.assetAllocation.map((asset, i) => (
                      <div key={i} className="flex items-center gap-4">
                        <div className="w-32 md:w-40 text-sm">{asset.asset}</div>
                        <div className="flex-1 h-7 md:h-8 bg-surface-solid rounded-lg overflow-hidden">
                          <div className="h-full bg-gradient-to-r from-accent/60 to-accent/30 rounded-lg flex items-center px-3"
                            style={{ width: `${asset.allocation * 100}%` }}>
                            <span className="text-xs font-medium tabular-nums">{(asset.allocation * 100).toFixed(0)}%</span>
                          </div>
                        </div>
                        <div className="w-16 text-sm text-text-muted text-right tabular-nums">
                          {(asset.expectedReturn * 100).toFixed(0)}% exp.
                        </div>
                      </div>
                    ))}
                  </div>
                  <div className="mt-4 pt-4 border-t border-border text-sm text-text-muted">
                    Weighted return: {(weightedNominalReturn * 100).toFixed(1)}% nominal, {(weightedRealReturn * 100).toFixed(1)}% real (after {inflationRate * 100}% inflation)
                  </div>
                </div>
              </Section>

              {/* Readiness Score */}
              <div className="glass-card rounded-2xl p-6 md:p-8 mb-8 animate-fadeIn">
                <div className="flex flex-col md:flex-row md:items-start justify-between mb-6 gap-4">
                  <div>
                    <p className="text-text-muted text-sm mb-2">Retirement Readiness</p>
                    <div className="flex items-baseline gap-2">
                      <span className="font-display text-5xl md:text-6xl font-semibold text-accent tabular-nums">{data.readinessScore}</span>
                      <span className="font-display text-xl md:text-2xl text-text-muted">%</span>
                    </div>
                  </div>
                  <div className="text-left md:text-right">
                    <div className="font-display text-2xl md:text-3xl font-semibold tabular-nums">${(data.projectedBalance / 1000000).toFixed(1)}M</div>
                    <div className="text-sm text-text-muted mt-1">Projected at {assumptions.retirementAge}</div>
                  </div>
                </div>
                <ProgressBar value={data.readinessScore} glow className="mb-6" />
                <div className="grid grid-cols-3 gap-4 md:gap-6 pt-4 md:pt-6 border-t border-border">
                  {[
                    { label: 'Projected Income', value: `$${data.monthlyIncome.toLocaleString()}`, sub: '/month' },
                    { label: 'Target Income', value: `$${assumptions.incomeRequired.toLocaleString()}`, sub: '/month' },
                    { label: 'Monthly Gap', value: `-$${data.gap.toLocaleString()}`, sub: '/month', warning: true },
                  ].map((item, i) => (
                    <div key={i}>
                      <div className="text-xs md:text-sm text-text-muted mb-1">{item.label}</div>
                      <div className={`font-display text-lg md:text-xl font-semibold tabular-nums ${item.warning ? 'text-warning' : ''}`}>
                        {item.value}<span className="text-xs md:text-sm text-text-muted font-normal">{item.sub}</span>
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Drawdown Order */}
              <Section title="Drawdown Order" actions={
                <div className="flex items-center gap-2">
                  <span className="text-xs text-success px-2 py-1 bg-success/10 rounded">AI Optimized</span>
                  <button onClick={() => setShowDrawdownOrder(true)} className="text-sm text-accent hover:text-accent-dim font-medium">Edit</button>
                </div>
              }>
                <div className="glass-card rounded-2xl p-4 md:p-5">
                  <div className="space-y-3">
                    {drawdownOrder.map((account, i) => (
                      <div key={account.id} className="flex items-start gap-4 p-3 rounded-xl hover:bg-surface-hover transition-colors">
                        <span className="w-7 h-7 rounded-full bg-accent/10 flex items-center justify-center text-sm font-semibold text-accent">{i + 1}</span>
                        <div className="flex-1">
                          <div className="flex items-center justify-between">
                            <div className="font-medium">{account.name}</div>
                            <div className="font-medium tabular-nums">${account.balance.toLocaleString()}</div>
                          </div>
                          <div className="text-sm text-text-muted mt-1">{account.aiReason}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </Section>

              {/* AI Recommendations */}
              <Section title="AI Recommendations">
                <div className="space-y-3">
                  {recommendations.map((rec) => (
                    <div key={rec.id} className={`glass-card rounded-2xl p-4 md:p-5 flex items-start gap-4 transition-all duration-300 ${rec.applied ? 'border-success/30 bg-success/5' : 'glass-card-hover'}`}>
                      <div className={`w-2 h-2 rounded-full mt-1.5 ${rec.applied ? 'bg-success' : rec.priority === 'high' ? 'bg-warning' : 'bg-accent'}`} />
                      <div className="flex-1"><div className="text-sm leading-relaxed">{rec.text}</div></div>
                      {rec.applied ? (
                        <span className="text-xs text-success font-medium">✓ Applied</span>
                      ) : (
                        <button onClick={() => setRecommendations(prev => prev.map(r => r.id === rec.id ? { ...r, applied: true } : r))}
                          className="text-sm text-accent hover:text-accent-dim font-medium transition-colors">Apply</button>
                      )}
                    </div>
                  ))}
                </div>
              </Section>
            </div>

            {/* Chat Panel - Hidden on mobile, visible on md+ */}
            <div className="hidden md:flex w-96 border-l border-border flex-col bg-bg-elevated/30">
              <div className="p-5 border-b border-border">
                <h3 className="font-display text-lg font-medium">AI Advisor</h3>
                <div className="text-sm text-text-muted mt-0.5">Ask questions about your retirement plan</div>
              </div>
              <div className="flex-1 overflow-y-auto scrollbar-thin p-5 space-y-4">
                {messages.map((msg, i) => (
                  <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'} animate-fadeIn`}>
                    <div className={`max-w-[85%] rounded-2xl px-4 py-3 text-sm leading-relaxed ${msg.role === 'user' ? 'chat-bubble-user text-white' : 'chat-bubble-ai'}`}>{msg.content}</div>
                  </div>
                ))}
              </div>
              <div className="p-5 border-t border-border">
                <div className="flex gap-2">
                  <input type="text" value={chatInput} onChange={(e) => setChatInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && sendMessage()}
                    placeholder="Ask about your plan..." className="flex-1 bg-surface-solid border border-border rounded-xl px-4 py-3 text-sm input-focus" />
                  <button onClick={sendMessage} className="px-4 py-3 bg-accent text-bg rounded-xl font-semibold btn-lift">→</button>
                </div>
              </div>
            </div>
          </div>

          {/* Modals */}
          <Modal isOpen={showHistory} onClose={() => setShowHistory(false)} title="Version History">
            <div className="space-y-3">
              {data.history.map((h, i) => (
                <div key={i} className={`p-4 rounded-xl border ${i === 0 ? 'border-accent/30 bg-accent/5' : 'border-border'}`}>
                  <div className="flex items-center justify-between">
                    <span className="font-medium">{h.version}</span>
                    <span className="text-sm text-text-muted">{h.date}</span>
                  </div>
                  <div className="text-sm text-text-muted mt-1">{h.note}</div>
                </div>
              ))}
            </div>
          </Modal>

          <Modal isOpen={showScenario} onClose={() => setShowScenario(false)} title="Retirement Scenarios">
            {!scenarioResult ? (
              <div className="flex items-center justify-center py-12">
                <div className="text-center">
                  <div className="w-12 h-12 rounded-full bg-accent/10 mx-auto mb-4 flex items-center justify-center"><span className="text-xl">◎</span></div>
                  <div className="text-sm text-text-muted">Running scenarios...</div>
                </div>
              </div>
            ) : (
              <div className="space-y-3">
                {Object.entries(scenarioResult).map(([key, val]) => (
                  <div key={key} className="p-5 rounded-xl border border-border hover:border-accent/30 cursor-pointer transition-all duration-200 glass-card-hover">
                    <div className="flex items-center justify-between mb-2">
                      <span className="font-medium">Retire at {key === 'retireAt62' ? '62' : key === 'retireAt65' ? '65' : '67'}</span>
                      <span className={`font-display text-2xl font-semibold ${val.score >= 80 ? 'text-success' : val.score >= 70 ? 'text-warning' : 'text-danger'}`}>{val.score}%</span>
                    </div>
                    <div className="grid grid-cols-2 gap-4 text-sm text-text-muted">
                      <div>Balance: ${(val.balance / 1000000).toFixed(2)}M</div>
                      <div>Monthly: ${val.monthlyIncome.toLocaleString()}</div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </Modal>

          <Modal isOpen={showDrawdownOrder} onClose={() => setShowDrawdownOrder(false)} title="Edit Drawdown Order" wide>
            <div className="space-y-3 mb-6">
              {drawdownOrder.map((account, i) => (
                <div key={account.id} className="flex items-center gap-4 p-4 bg-surface-solid rounded-xl border border-border">
                  <div className="flex flex-col gap-1">
                    <button onClick={() => moveDrawdownItem(account.id, 'up')} disabled={i === 0} className="text-xs text-text-muted hover:text-text disabled:opacity-20">▲</button>
                    <button onClick={() => moveDrawdownItem(account.id, 'down')} disabled={i === drawdownOrder.length - 1} className="text-xs text-text-muted hover:text-text disabled:opacity-20">▼</button>
                  </div>
                  <span className="w-8 h-8 rounded-full bg-accent/10 flex items-center justify-center text-sm font-semibold text-accent">{i + 1}</span>
                  <div className="flex-1">
                    <div className="font-medium">{account.name}</div>
                    <div className="text-sm text-text-muted">{account.aiReason}</div>
                  </div>
                  <div className="font-medium tabular-nums">${account.balance.toLocaleString()}</div>
                </div>
              ))}
            </div>
            <div className="flex gap-3 justify-end pt-4 border-t border-border">
              <button onClick={() => setShowDrawdownOrder(false)} className="px-5 py-2.5 text-sm rounded-xl border border-border hover:bg-surface-hover font-medium">Cancel</button>
              <button onClick={() => setShowDrawdownOrder(false)} className="px-5 py-2.5 text-sm rounded-xl bg-gradient-to-r from-accent to-accent-dim text-bg font-semibold btn-lift">Save Order</button>
            </div>
          </Modal>
        </div>
      );
    }

    // New Plan Modal
    function NewPlanModal({ isOpen, onClose }) {
      const navigate = useNavigate();
      return (
        <Modal isOpen={isOpen} onClose={onClose} title="Create New Plan">
          <div className="space-y-3">
            {planTemplates.map(pt => (
              <button key={pt.type} onClick={() => { onClose(); navigate(`/plans/new-${pt.type}`); }}
                className="w-full p-5 rounded-xl border border-border hover:border-accent/30 text-left transition-all duration-200 flex items-center gap-4 glass-card-hover">
                <div className="w-12 h-12 rounded-xl bg-accent/10 flex items-center justify-center text-accent text-xl">{pt.icon}</div>
                <div>
                  <div className="font-semibold text-base">{pt.name}</div>
                  <div className="text-sm text-text-secondary mt-0.5">{pt.desc}</div>
                </div>
              </button>
            ))}
          </div>
        </Modal>
      );
    }

    // Main App with Router
    function App() {
      const [showNewPlan, setShowNewPlan] = useState(false);
      const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

      return (
        <SimpleRouter>
          <div className="flex h-screen bg-bg">
            <MobileMenuButton onClick={() => setMobileMenuOpen(true)} />
            <Sidebar onNewPlan={() => setShowNewPlan(true)} mobileOpen={mobileMenuOpen} setMobileOpen={setMobileMenuOpen} />
            <div className="flex-1 flex flex-col ml-0 md:ml-0 pt-14 md:pt-0">
              <Routes>
                <Route path="/" element={<DashboardPage />} />
                <Route path="/net-worth" element={<NetWorthPage />} />
                <Route path="/cash-flow" element={<CashFlowPage />} />
                <Route path="/tax-strategy" element={<TaxStrategyPage />} />
                <Route path="/plans/retirement" element={<RetirementPage />} />
                <Route path="/plans/debt-payoff" element={<DebtPayoffPage />} />
                <Route path="/plans/savings-:id" element={<SavingsGoalPage />} />
                <Route path="*" element={<DashboardPage />} />
              </Routes>
            </div>
            <NewPlanModal isOpen={showNewPlan} onClose={() => setShowNewPlan(false)} />
          </div>
        </SimpleRouter>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
