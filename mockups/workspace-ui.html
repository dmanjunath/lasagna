      color: #e5e5e5;

    .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeIn { animation: fadeIn 0.2s ease-out; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .animate-slideIn { animation: slideIn 0.3s ease-out; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }

    // Tax Strategy Document with PDF upload and account suggestions
    function TaxStrategyDocument({ data }) {
      const [uploadedFiles, setUploadedFiles] = useState(data.uploadedReturns);
      const [isAnalyzing, setIsAnalyzing] = useState(false);
      const [analysisResult, setAnalysisResult] = useState(null);
      const fileInputRef = useRef(null);

      const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if (file && file.type === 'application/pdf') {
          const newFile = { name: file.name, uploadedAt: 'Just now', status: 'analyzing' };
          setUploadedFiles(prev => [...prev, newFile]);
          setIsAnalyzing(true);

          // Simulate analysis
          setTimeout(() => {
            setUploadedFiles(prev => prev.map(f =>
              f.name === file.name ? { ...f, status: 'complete' } : f
            ));
            setIsAnalyzing(false);
            setAnalysisResult({
              year: '2025',
              income: 185000,
              deductions: 28500,
              taxPaid: 38200,
              opportunities: [
                'You may have missed $2,400 in charitable deduction carryover',
                'HSA contribution was $1,200 below maximum',
                'Consider bunching deductions in alternating years',
              ]
            });
          }, 3000);
        }
      };

      return (
        <div className="flex-1 overflow-y-auto scrollbar-thin p-6 animate-slideIn">
          <div className="bg-surface border border-border rounded-xl p-6 mb-6">
            <div className="grid grid-cols-3 gap-6">

      const [showWithdrawalRules, setShowWithdrawalRules] = useState(false);
      const [recommendations, setRecommendations] = useState(data.recommendations);
      const [scenarioResult, setScenarioResult] = useState(null);
      const [drawdownOrder, setDrawdownOrder] = useState(data.drawdownOrder);
      const [withdrawalRules, setWithdrawalRules] = useState(data.withdrawalRules);
      const [assumptions, setAssumptions] = useState({
        retirementAge: 65,
        lifeExpectancy: 90,
        incomeRequired: 5500,
        currentSavings: 450000,
        monthlyContribution: 2500,
        expectedReturn: 7,
        inflationRate: 2.5,
      });

      const sendMessage = () => {
        if (!chatInput.trim()) return;
        const userMsg = chatInput;
        setMessages(prev => [...prev, { role: 'user', content: userMsg }]);
        setChatInput('');

        setTimeout(() => {
          let response = "I'll analyze that for you. Based on your current plan...";
          if (userMsg.toLowerCase().includes('retire early') || userMsg.toLowerCase().includes('62')) {
            response = "Retiring at 62 instead of 65 would reduce your projected balance by approximately $180,000. Your monthly income would drop to $3,400, increasing the gap to $2,100. To offset this, you'd need to increase savings by $1,200/month or reduce your target income.";
          } else if (userMsg.toLowerCase().includes('401k') || userMsg.toLowerCase().includes('contribution')) {
            response = "If you max out your 401(k) at $23,000/year, your projected balance at 65 increases to $1.45M, bringing monthly income to $4,800. That closes 53% of your current gap.";
          } else if (userMsg.toLowerCase().includes('social security')) {
            response = "Delaying Social Security to 70 would increase your benefit from $2,100 to $2,640/month — a 26% increase. Combined with your investments, this could fully close your income gap.";
          } else if (userMsg.toLowerCase().includes('drawdown') || userMsg.toLowerCase().includes('withdrawal')) {
            response = "Your current drawdown order prioritizes taxable accounts first to let tax-advantaged accounts grow. This is optimal for most scenarios. The withdrawal rules you've set will protect against sequence-of-returns risk.";
          }
          setMessages(prev => [...prev, { role: 'assistant', content: response }]);
        }, 1000);
      };

      const applyRecommendation = (id) => {
        setRecommendations(prev => prev.map(r => r.id === id ? { ...r, applied: true } : r));
        setMessages(prev => [...prev,
          { role: 'assistant', content: `✓ Applied recommendation. I've updated your plan assumptions. Your new readiness score is 78%.` }

        const newOrder = [...drawdownOrder];
        const swapIdx = direction === 'up' ? idx - 1 : idx + 1;
        [newOrder[idx], newOrder[swapIdx]] = [newOrder[swapIdx], newOrder[idx]];
        newOrder.forEach((item, i) => item.order = i + 1);
        setDrawdownOrder(newOrder);
      };

      const toggleWithdrawalRule = (id) => {

                    <span className="text-xs text-textMuted">{h.date}</span>
                  </div>
                  <div className="text-sm text-textMuted mt-1">{h.note}</div>
                  {i > 0 && (
                    <button className="text-xs text-accent mt-2 hover:text-accentDim">Restore this version</button>
                  )}
                </div>
              ))}
            </div>
          </Modal>

          {/* Scenario Modal */}
          <Modal isOpen={showScenario} onClose={() => setShowScenario(false)} title="Retirement Age Scenarios">
            {!scenarioResult ? (
              <div className="flex items-center justify-center py-8">
                <div className="text-center">
                  <div className="text-2xl mb-2 animate-pulse">🔮</div>
                  <div className="text-sm text-textMuted">Running scenarios...</div>
                </div>
              </div>
            ) : (
              <div className="space-y-3">
                {Object.entries(scenarioResult).map(([key, val]) => (
                  <div key={key} className="p-4 rounded-lg border border-border hover:border-accent/50 cursor-pointer transition-colors">
                    <div className="flex items-center justify-between mb-2">
                      <span className="font-medium">
                        Retire at {key === 'retireAt62' ? '62' : key === 'retireAt65' ? '65' : '67'}
                      </span>
                      <span className={`text-lg font-bold ${val.score >= 80 ? 'text-accent' : val.score >= 70 ? 'text-yellow-400' : 'text-orange-400'}`}>
                        {val.score}%
                      </span>
                    </div>
                    <div className="grid grid-cols-2 gap-4 text-sm text-textMuted">
                      <div>Balance: ${(val.balance / 1000000).toFixed(2)}M</div>
                      <div>Monthly: ${val.monthlyIncome.toLocaleString()}</div>
                    </div>
                  </div>
                ))}
                <div className="text-xs text-textMuted pt-2 border-t border-border">
                  Click a scenario to apply it to your plan
                </div>
              </div>
            )}
          </Modal>

          {/* Edit Assumptions Modal */}
          <Modal isOpen={showEditAssumptions} onClose={() => setShowEditAssumptions(false)} title="Edit Assumptions" wide>
            <div className="space-y-4">
              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="block text-sm text-textMuted mb-1">Retirement Age</label>
                  <input
                    type="number"
                    value={assumptions.retirementAge}
                    onChange={(e) => setAssumptions(prev => ({ ...prev, retirementAge: parseInt(e.target.value) }))}
                    className="w-full bg-bg border border-border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-accent"
                  />
                </div>
                <div>
                  <label className="block text-sm text-textMuted mb-1">Life Expectancy</label>
                  <input
                    type="number"
                    value={assumptions.lifeExpectancy}
                    onChange={(e) => setAssumptions(prev => ({ ...prev, lifeExpectancy: parseInt(e.target.value) }))}
                    className="w-full bg-bg border border-border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-accent"
                  />
                </div>
                <div>
                  <label className="block text-sm text-textMuted mb-1">Monthly Income Required ($)</label>
                  <input
                    type="number"
                    value={assumptions.incomeRequired}
                    onChange={(e) => setAssumptions(prev => ({ ...prev, incomeRequired: parseInt(e.target.value) }))}
                    className="w-full bg-bg border border-border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-accent"
                  />
                </div>
                <div>
                  <label className="block text-sm text-textMuted mb-1">Current Savings ($)</label>
                  <input
                    type="number"
                    value={assumptions.currentSavings}
                    onChange={(e) => setAssumptions(prev => ({ ...prev, currentSavings: parseInt(e.target.value) }))}
                    className="w-full bg-bg border border-border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-accent"
                  />
                </div>
                <div>
                  <label className="block text-sm text-textMuted mb-1">Monthly Contribution ($)</label>
                  <input
                    type="number"
                    value={assumptions.monthlyContribution}
                    onChange={(e) => setAssumptions(prev => ({ ...prev, monthlyContribution: parseInt(e.target.value) }))}
                    className="w-full bg-bg border border-border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-accent"
                  />
                </div>
                <div>
                  <label className="block text-sm text-textMuted mb-1">Expected Return (%)</label>
                  <input
                    type="number"
                    step="0.1"
                    value={assumptions.expectedReturn}
                    onChange={(e) => setAssumptions(prev => ({ ...prev, expectedReturn: parseFloat(e.target.value) }))}
                    className="w-full bg-bg border border-border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-accent"
                  />
                </div>
              </div>
              <div className="flex gap-2 justify-end pt-4 border-t border-border">
                <button
                  onClick={() => setShowEditAssumptions(false)}
                  className="px-4 py-2 text-sm rounded-lg border border-border hover:bg-surfaceHover"
                >
                  Cancel
                </button>
                <button
                  onClick={() => setShowEditAssumptions(false)}
                  className="px-4 py-2 text-sm rounded-lg bg-accent text-black font-medium"
                >
                  Save & Recalculate
                </button>
              </div>
            </div>
          </Modal>

          {/* Drawdown Order Modal */}
          <Modal isOpen={showDrawdownOrder} onClose={() => setShowDrawdownOrder(false)} title="Optimal Drawdown Order" wide>
            <div className="space-y-4">
              <div className="text-sm text-textMuted mb-4">
                Drag accounts to reorder, or use AI to optimize based on your tax situation.
              </div>
              <div className="space-y-2">
                {drawdownOrder.map((account, i) => (
                  <div key={account.id} className="flex items-center gap-3 p-3 bg-bg rounded-lg border border-border">
                    <div className="flex flex-col gap-1">
                      <button
                        onClick={() => moveDrawdownItem(account.id, 'up')}
                        className="text-xs text-textMuted hover:text-text disabled:opacity-30"
                        disabled={i === 0}
                      >▲</button>
                      <button
                        onClick={() => moveDrawdownItem(account.id, 'down')}
                        className="text-xs text-textMuted hover:text-text disabled:opacity-30"
                        disabled={i === drawdownOrder.length - 1}
                      >▼</button>
                    </div>
                    <span className="text-lg font-bold text-textMuted w-8">{i + 1}</span>
                    <div className="flex-1">
                      <div className="font-medium">{account.name}</div>
                      <div className="text-sm text-textMuted capitalize">{account.type} account</div>
                    </div>
                    <div className="text-right">
                      <div className="font-medium">${account.balance.toLocaleString()}</div>
                      <div className="text-xs text-textMuted">balance</div>
                    </div>
                  </div>
                ))}
              </div>
              <div className="bg-accent/5 border border-accent/20 rounded-lg p-4 text-sm">
                <div className="font-medium mb-1">AI Recommendation</div>
                <div className="text-textMuted">
                  Your current order is optimal. Withdrawing from taxable accounts first allows Roth to grow tax-free longest.
                </div>
              </div>
              <div className="flex gap-2 justify-end pt-4 border-t border-border">
                <button
                  onClick={() => setShowDrawdownOrder(false)}
                  className="px-4 py-2 text-sm rounded-lg border border-border hover:bg-surfaceHover"
                >
                  Cancel
                </button>
                <button
                  onClick={() => setShowDrawdownOrder(false)}
                  className="px-4 py-2 text-sm rounded-lg bg-accent text-black font-medium"
                >
                  Save Order
                </button>
              </div>
            </div>
          </Modal>

          {/* Withdrawal Rules Modal */}
          <Modal isOpen={showWithdrawalRules} onClose={() => setShowWithdrawalRules(false)} title="Special Withdrawal Rules" wide>
            <div className="space-y-4">
              <div className="text-sm text-textMuted mb-4">
                Configure rules that override the standard drawdown order in specific situations.
              </div>
              <div className="space-y-3">
                {withdrawalRules.map(rule => (
                  <div key={rule.id} className="p-4 bg-bg rounded-lg border border-border">
                    <div className="flex items-start gap-3">
                      <button
                        onClick={() => toggleWithdrawalRule(rule.id)}
                        className={`mt-0.5 w-10 h-6 rounded-full transition-colors ${rule.enabled ? 'bg-accent' : 'bg-border'}`}
                      >
                        <div className={`w-4 h-4 rounded-full bg-white transition-transform ${rule.enabled ? 'translate-x-5' : 'translate-x-1'}`} />
                      </button>
                      <div className="flex-1">
                        <div className="font-medium text-sm">When: {rule.condition}</div>
                        <div className="text-sm text-textMuted mt-1">Action: {rule.action}</div>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
              <button className="w-full py-3 border-2 border-dashed border-border rounded-lg text-sm text-textMuted hover:border-accent/50 transition-colors">
                + Add Custom Rule
              </button>
              <div className="flex gap-2 justify-end pt-4 border-t border-border">
                <button
                  onClick={() => setShowWithdrawalRules(false)}
                  className="px-4 py-2 text-sm rounded-lg border border-border hover:bg-surfaceHover"
                >
                  Cancel
                </button>
                <button
                  onClick={() => setShowWithdrawalRules(false)}
                  className="px-4 py-2 text-sm rounded-lg bg-accent text-black font-medium"
                >
                  Save Rules
                </button>
              </div>
            </div>
          </Modal>
        </div>
      );
    }

    // New Plan Modal
    function NewPlanModal({ isOpen, onClose }) {
      const planTypes = [
        { id: 'retirement', icon: '🏖️', name: 'Retirement Plan', desc: 'Model retirement readiness and income' },
        { id: 'tax', icon: '📋', name: 'Tax Strategy', desc: 'Optimize taxes and find savings' },
        { id: 'debt', icon: '💳', name: 'Debt Payoff', desc: 'Create a debt elimination plan' },
        { id: 'goal', icon: '🎯', name: 'Savings Goal', desc: 'Track progress toward a goal' },
        { id: 'cashflow', icon: '💰', name: 'Cash Flow Analysis', desc: 'Understand your monthly money flow' },
      ];

      return (
        <Modal isOpen={isOpen} onClose={onClose} title="Create New Plan">
          <div className="space-y-2">
            {planTypes.map(pt => (
              <button
                key={pt.id}
                onClick={onClose}
                className="w-full p-4 rounded-lg border border-border hover:border-accent/50 hover:bg-surfaceHover text-left transition-colors flex items-center gap-3"
              >
                <span className="text-2xl">{pt.icon}</span>
                <div>
                  <div className="font-medium">{pt.name}</div>
                  <div className="text-sm text-textMuted">{pt.desc}</div>
                </div>
              </button>
            ))}
          </div>
        </Modal>
      );
    }

    // Main App
    function App() {
      const [activeDoc, setActiveDoc] = useState('dashboard');
      const [showNewPlan, setShowNewPlan] = useState(false);

      const renderDocument = () => {
        const data = documentsData[activeDoc];
        if (!data) return null;

        switch (data.type) {
          case 'dashboard':
            return <DashboardDocument data={data} setActiveDoc={setActiveDoc} />;
          case 'networth':
            return <NetWorthDocument data={data} />;
          case 'retirement':
            return <RetirementDocument data={data} />;
          case 'tax':
            return <TaxStrategyDocument data={data} />;
          case 'debt':
            return <DebtPayoffDocument data={data} />;
          case 'cashflow':
            return <CashFlowDocument data={data} />;
          default:
            return null;
        }
      };

      return (
        <div className="flex h-screen bg-bg">
          <Sidebar
            activeDoc={activeDoc}
            setActiveDoc={setActiveDoc}
            onNewPlan={() => setShowNewPlan(true)}
          />
          <div className="flex-1 flex flex-col">
            {renderDocument()}
          </div>
          <NewPlanModal isOpen={showNewPlan} onClose={() => setShowNewPlan(false)} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
